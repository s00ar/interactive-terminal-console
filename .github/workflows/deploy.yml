name: Deploy RPG Interface

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      sync_database:
        description: Replace the production MySQL data with data/users.json and data/evidence.json after upload
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: rpginterface-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: ${{ vars.APP_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Download Git LFS assets
        run: |
          git lfs pull
          git lfs checkout

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"

      - name: Lint PHP entry points
        run: |
          php -l api.php
          php -l db_config.php
          php -l deploy_sync.php

      - name: Build release bundle
        shell: pwsh
        env:
          APP_DB_HOST: ${{ secrets.APP_DB_HOST }}
          APP_DB_PORT: ${{ secrets.APP_DB_PORT }}
          APP_DB_NAME: ${{ secrets.APP_DB_NAME }}
          APP_DB_USER: ${{ secrets.APP_DB_USER }}
          APP_DB_PASSWORD: ${{ secrets.APP_DB_PASSWORD }}
          DEPLOY_HOOK_TOKEN: ${{ secrets.DEPLOY_HOOK_TOKEN }}
        run: ./deploy/build-release.ps1 -OutputRoot ./deploy/build

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-release
          if-no-files-found: error
          path: deploy/build/

      - name: Upload site files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ vars.DEPLOY_PORT || '21' }}
          protocol: ${{ vars.DEPLOY_PROTOCOL || 'ftp' }}
          server-dir: ${{ secrets.DEPLOY_SERVER_DIR }}
          local-dir: ./deploy/build/site/

      - name: Smoke test site root
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          APP_URL="${APP_URL%/}"
          curl \
            --fail \
            --show-error \
            --silent \
            --retry 5 \
            --retry-delay 5 \
            "${APP_URL}/" > /dev/null

      - name: Sync database from uploaded JSON
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sync_database }}
        env:
          APP_URL: ${{ vars.APP_URL }}
          DEPLOY_HOOK_TOKEN: ${{ secrets.DEPLOY_HOOK_TOKEN }}
        run: |
          APP_URL="${APP_URL%/}"
          curl \
            --fail \
            --show-error \
            --silent \
            --retry 5 \
            --retry-delay 5 \
            --request POST \
            --header "Authorization: Bearer ${DEPLOY_HOOK_TOKEN}" \
            "${APP_URL}/deploy_sync.php"

      - name: Smoke test API bootstrap
        env:
          APP_URL: ${{ vars.APP_URL }}
        run: |
          APP_URL="${APP_URL%/}"
          response="$(curl \
            --fail \
            --show-error \
            --silent \
            --retry 5 \
            --retry-delay 5 \
            "${APP_URL}/api.php?action=bootstrap")"
          echo "$response" | grep '"ok":true' > /dev/null
